services:
  mongo:
    image: mongo:7
    container_name: dms-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?bitte in .env setzen}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?bitte in .env setzen}
    ports:
      - "27017:27017"
    volumes:
      - ./docker-data/mongo:/data/db
