# Frontend-nginx: serviert das gebaute Quasar-SPA und proxiet /api an Backend.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vue-Router im History-Mode: alle unbekannten Routen -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API-Proxy zum Backend-Service in compose.yml
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Uploads koennen gross werden - Default 1m wuerde 20MB-PDFs blockieren
        client_max_body_size 25m;

        # API-Antworten nicht cachen (Browser cached sonst z.B. 410-Gone und
        # liefert die Antwort weiter aus, auch nachdem der Server-Bug gefixt ist).
        add_header Cache-Control "no-store" always;
    }

    # Statische Assets aggressiv cachen
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Gzip fuer Text-Inhalte
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
}
